<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NO:48 | THE BEAST v4.1</title>
    <style>
        :root { --bg: #05070a; --card: #10141d; --gold: #d4af37; --sky: #00d2ff; --text: #ffffff; --red: #ff4d4d; --green: #4ade80; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 20px; background: #10141d; }
        .logo-svg { width: 60px; height: 60px; filter: drop-shadow(0 0 5px var(--gold)); }
        .panel { display: none; padding: 20px; }
        .panel.active { display: block; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #1f2937; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #070a10; display: flex; overflow-x: auto; padding: 15px 5px; border-top: 1px solid #1f2937; z-index: 9999; }
        .nav-item { min-width: 70px; text-align: center; color: #555; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; margin-top: 5px; cursor: pointer; }
        iframe { width: 100%; height: 500px; border-radius: 15px; border: none; background: white; }
    </style>
</head>
<body>

    <div class="header">
        <svg class="logo-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="35" r="20" fill="#FFD700" />
            <path d="M10 75 Q50 60 90 75" fill="#38BDF8" />
            <path d="M30 70 L30 50 L38 50 L38 45 L46 45 L46 50 L54 50 L54 45 L62 45 L62 50 L70 50 L70 70 Z" fill="#D4AF37" />
        </svg>
        <h1 style="color:var(--gold); margin:0; font-size:24px;">NO:48</h1>
    </div>

    <div id="p-dash" class="panel active">
        <div class="grid">
            <div class="card"><h3>Saat</h3><div id="clock" style="font-size:24px;">00:00</div></div>
            <div class="card"><h3>Ekip</h3><div id="staff-count" style="font-size:24px;">0 / 13</div></div>
        </div>
        <div class="card" style="margin-top:10px;">
            <p id="aura-msg" style="color:var(--sky); font-size:13px;">AURA: Sistem yükleniyor...</p>
        </div>
    </div>

    <div id="p-store" class="panel">
        <h2>💼 Mola Takibi</h2>
        <div id="staff-list"></div>
    </div>

    <div id="p-odds" class="panel">
        <h2 style="color:var(--red)">⚽ Stadium</h2>
        <iframe src="https://www.livescore.bz/webmasters/external/v2/livescore?timezone=Europe/Istanbul&show_logos=1"></iframe>
    </div>

    <div id="p-god" class="panel">
        <h2>⚡ Tanrı Modu</h2>
        <div class="card">
            <input type="text" id="staff-name" style="width:100%; padding:10px;" placeholder="Personel İsmi">
            <button class="btn" style="background:var(--sky)" onclick="addStaff()">Ekle</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('p-dash', this)">🏠<br>Dash</div>
        <div class="nav-item" onclick="nav('p-store', this)">💼<br>Mola</div>
        <div class="nav-item" onclick="nav('p-odds', this)">⚽<br>Maçlar</div>
        <div class="nav-item" onclick="nav('p-god', this)">⚡<br>Tanrı</div>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('no48_v41')) || { staff: [] };
        function save() { localStorage.setItem('no48_v41', JSON.stringify(db)); render(); }
        function nav(id, el) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        function addStaff() {
            let n = document.getElementById('staff-name').value;
            if(n) { db.staff.push({name: n, mola: false}); save(); document.getElementById('staff-name').value=''; }
        }
        function toggle(i) { db.staff[i].mola = !db.staff[i].mola; save(); }
        function render() {
            let moladakiler = db.staff.filter(s => s.mola).length;
            document.getElementById('staff-count').innerText = `${moladakiler} / ${db.staff.length}`;
            document.getElementById('staff-list').innerHTML = db.staff.map((s,i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                    <span>${s.name}</span>
                    <button onclick="toggle(${i})" style="background:${s.mola?'red':'green'}; color:white; border:none; padding:5px 10px; border-radius:5px;">
                        ${s.mola?'MOLADA':'MOLA VER'}
                    </button>
                </div>
            `).join('');
            document.getElementById('aura-msg').innerText = moladakiler > 2 ? "AURA: Çok kişi molada!" : "AURA: Her şey yolunda Hasan.";
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
        render();
    </script>
</body>
</html>
