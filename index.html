<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NO:48 | THE BEAST v4.0</title>
    <style>
        :root { --bg: #05070a; --card: #10141d; --gold: #d4af37; --sky: #00d2ff; --text: #ffffff; --red: #ff4d4d; --green: #4ade80; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .header { text-align: center; padding: 25px; background: linear-gradient(to bottom, #10141d, transparent); }
        .logo-svg { width: 70px; height: 70px; filter: drop-shadow(0 0 10px var(--gold)); }
        .aura-box { font-size: 12px; color: var(--sky); background: rgba(0,210,255,0.05); padding: 12px; border-radius: 15px; margin: 10px 20px; border: 1px dashed var(--sky); line-height: 1.5; }

        .panel { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .panel.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #1f2937; position: relative; }
        .card h3 { margin: 0; font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        .val { font-size: 20px; font-weight: 800; margin-top: 8px; }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #161e2d; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .mola-btn { background: var(--green); color: #000; border: none; padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .mola-active { background: var(--red) !important; color: white !important; }

        /* Canlı Skor Alanı */
        #livescore-container { border-radius: 20px; overflow: hidden; border: 1px solid #1f2937; height: 500px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #070a10; display: flex; overflow-x: auto; padding: 15px 5px; border-top: 1px solid #1f2937; z-index: 1000; scrollbar-width: none; }
        .nav-item { min-width: 75px; text-align: center; color: #444; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 5px; }

        input { width: 100%; padding: 14px; margin: 10px 0; background: #161e2d; border: 1px solid #2d3748; color: white; border-radius: 12px; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <svg class="logo-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="35" r="20" fill="#FFD700" opacity="0.8" />
            <path d="M10 75 Q50 60 90 75" fill="#38BDF8" />
            <path d="M30 70 L30 50 L38 50 L38 45 L46 45 L46 50 L54 50 L54 45 L62 45 L62 50 L70 50 L70 70 Z" fill="#D4AF37" />
            <circle cx="50" cy="62" r="6" fill="white" />
        </svg>
        <h1 id="main-title" style="color:var(--gold); margin:5px 0; letter-spacing: 3px;">NO:48</h1>
        <div class="aura-box" id="aura-chat">AURA: Maçlar canlı olarak takip ediliyor, skorları kaçırmayalım!</div>
    </div>

    <div id="p-dash" class="panel active">
        <div class="grid">
            <div class="card"><h3>Saat</h3><div class="val" id="clock">00:00</div></div>
            <div class="card" style="border-color:var(--red)"><h3>Canlı Skor</h3><div class="val" style="font-size:14px;">Maçları İzle →</div></div>
            <div class="card" style="border-color:var(--sky)"><h3>Ekip Molada</h3><div class="val"><span id="active-mola-count">0</span> / <span id="total-staff-count">0</span></div></div>
            <div class="card"><h3>Kalan Maaş</h3><div class="val" id="salary-view" style="font-size:18px;">52,000 ₺</div></div>
        </div>
    </div>

    <div id="p-store" class="panel">
        <h2 style="color:var(--gold)">💼 Mola Takip</h2>
        <div id="staff-container"></div>
    </div>

    <div id="p-odds" class="panel">
        <h2 style="color:var(--red)">⚽ Stadium: Canlı Skorlar</h2>
        <div id="livescore-container">
            <iframe id="livescore-iframe" src="https://www.livescore.bz/webmasters/external/v2/livescore?timezone=Europe/Istanbul&show_logos=1&events=1&odds=1" width="100%" height="100%" frameborder="0" style="border-radius:15px;"></iframe>
        </div>
    </div>

    <div id="p-begum" class="panel">
        <h2 style="color:var(--sky)">💎 VIP Begüm</h2>
        <div class="card" id="begum-list"></div>
        <input type="text" id="begum-note" placeholder="Notunu yaz...">
        <button class="btn" style="background:var(--gold)" onclick="addBegumNote()">Kaydet</button>
    </div>

    <div id="p-god" class="panel">
        <h2 style="color:var(--gold)">⚡ Tanrı Modu</h2>
        <div class="card">
            <input type="text" id="god-appname" placeholder="Sistem Adı">
            <input type="number" id="god-salary" placeholder="Maaş Girişi">
            <button class="btn" style="background:var(--gold)" onclick="updateGod()">Güncelle</button>
        </div>
        <div class="card">
            <input type="text" id="god-staff" placeholder="Personel İsmi">
            <button class="btn" style="background:var(--sky)" onclick="addStaff()">Ekibe Kat</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('p-dash', this)"><span>🏠</span>Dash</div>
        <div class="nav-item" onclick="nav('p-store', this)"><span>💼</span>Mola</div>
        <div class="nav-item" onclick="nav('p-begum', this)"><span>💎</span>Begüm</div>
        <div class="nav-item" onclick="nav('p-odds', this)"><span>⚽</span>Stadium</div>
        <div class="nav-item" onclick="nav('p-god', this)"><span>⚡</span>Tanrı</div>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('no48_v4')) || {
            name: "NO:48", salary: 52000, staff: [], begum: []
        };

        function save() { localStorage.setItem('no48_v4', JSON.stringify(db)); render(); }

        function nav(id, el) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function updateGod() {
            db.name = document.getElementById('god-appname').value || db.name;
            db.salary = document.getElementById('god-salary').value || db.salary;
            save(); alert("Sistem emirleri alındı.");
        }

        function addStaff() {
            let n = document.getElementById('god-staff').value;
            if(n) { db.staff.push({name: n, mola: false}); save(); document.getElementById('god-staff').value=''; }
        }

        function toggleMola(index) {
            db.staff[index].mola = !db.staff[index].mola;
            save();
        }

        function addBegumNote() {
            let note = document.getElementById('begum-note').value;
            if(note) { db.begum.push(note); save(); document.getElementById('begum-note').value=''; }
        }

        function render() {
            document.getElementById('main-title').innerText = db.name;
            document.getElementById('salary-view').innerText = Number(db.salary).toLocaleString() + " ₺";
            document.getElementById('total-staff-count').innerText = db.staff.length;
            
            let molaCount = db.staff.filter(s => s.mola).length;
            document.getElementById('active-mola-count').innerText = molaCount;

            const container = document.getElementById('staff-container');
            container.innerHTML = db.staff.map((s, i) => `<div class="item-row"><span>${s.name}</span><button class="mola-btn ${s.mola ? 'mola-active' : ''}" onclick="toggleMola(${i})">${s.mola ? 'MOLADA' : 'MOLA BAŞLAT'}</button></div>`).join('');

            document.getElementById('begum-list').innerHTML = db.begum.map((n, i) => `<div class="item-row" style="border-color:var(--sky)"><span>${n}</span><span onclick="removeBegum(${i})">✓</span></div>`).join('');
            
            // AURA Maç Yorumu
            if(molaCount == 0) {
                document.getElementById('aura-chat').innerText = "AURA: Hasan, ekip tam kadro sahada! Sen de rahatça maçları takip edebilirsin.";
            }
        }

        function removeBegum(i) { db.begum.splice(i, 1); save(); }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        render();
    </script>
</body>
</html>
