<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&B Kişisel Asistan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <img src="1775402448038.png" alt="H&B Logo" class="logo">
            <h1>H&B'ye Hoş Geldin</h1>
            <p>Kişisel asistanın emrinde.</p>
        </header>

        <main class="chat-container">
            <div class="message assistant">
                Merhaba! Ben H&B. Bugün sana nasıl yardımcı olabilirim? 🐾
            </div>
        </main>

        <footer>
            <input type="text" placeholder="H&B'ye bir şey yaz..." class="input-box">
            <button class="send-btn">Gönder</button>
        </footer>
    </div>
</body>
</html>
