<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NO:48 | THE COMMANDER v12.0</title>
    <style>
        :root {
            --gold: #d4af37; --sky: #00d2ff; --red: #ff4d4d; --green: #4ade80;
            --bg: #05070a; --card: #111827; --text: #ffffff; --border: #1f2937; --nav: #070a10;
        }
        [data-theme="light"] {
            --bg: #f3f4f6; --card: #ffffff; --text: #111827; --border: #e5e7eb; --nav: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        .header { text-align: center; padding: 15px; border-bottom: 1px solid var(--border); background: var(--card); sticky; top: 0; z-index: 100; }
        .logo-box { width: 50px; height: 50px; margin: 0 auto; filter: drop-shadow(0 0 8px var(--gold)); }
        
        .panel { display: none; padding: 15px; animation: slideUp 0.4s ease; }
        .panel.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-radius: 18px; padding: 15px; border: 1px solid var(--border); margin-bottom: 12px; }
        
        /* Mola Butonları & UI */
        .staff-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; border-left: 5px solid var(--gold); }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .m-btn { padding: 8px; border: none; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .b-yemek { background: var(--gold); }
        .b-mola { background: var(--sky); }
        .b-sigara { background: var(--green); }
        .b-stop { background: var(--red); color: white; grid-column: span 2; }
        
        .timer-display { font-family: monospace; font-size: 18px; color: var(--sky); font-weight: bold; margin-top: 5px; }

        /* Log Sistemi */
        .log-container { font-size: 11px; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; height: 200px; overflow-y: auto; border: 1px solid var(--border); }
        .log-entry { margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px solid #333; }
        .log-time { color: var(--gold); margin-right: 5px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav); display: flex; overflow-x: auto; padding: 10px 5px; border-top: 1px solid var(--border); z-index: 1000; scrollbar-width: none; }
        .nav-item { min-width: 75px; text-align: center; color: #6b7280; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 4px; font-style: normal; }

        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-box">
            <svg viewBox="0 0 100 100"><circle cx="50" cy="35" r="20" fill="var(--gold)" opacity="0.8" /><path d="M10 75 Q50 60 90 75" stroke="var(--sky)" stroke-width="4" fill="none" /><path d="M30 70 L30 50 L38 50 L38 45 L46 45 L46 50 L54 50 L54 45 L62 45 L62 50 L70 50 L70 70 Z" fill="var(--gold)" /></svg>
        </div>
        <div id="aura-status" style="font-size:11px; color:var(--sky); font-weight:bold; margin-top:5px;">AURA: Komuta Merkezi Hazır</div>
    </header>

    <div id="p-dash" class="panel active">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="card"><h3>Kalan</h3><div id="d-bal" style="font-size:18px; font-weight:800;">0 ₺</div></div>
            <div class="card"><h3>Molada</h3><div id="d-mola" style="font-size:18px; font-weight:800;">0</div></div>
        </div>
        <div class="card">
            <h3>Son Hareketler (Logs)</h3>
            <div id="dash-logs" class="log-container" style="height:150px;"></div>
        </div>
    </div>

    <div id="p-store" class="panel">
        <h2 style="color:var(--gold)">💼 Mağaza Komuta</h2>
        <div id="staff-container"></div>
    </div>

    <div id="p-begum" class="panel">
        <h2 style="color:var(--sky)">💎 VIP Begüm</h2>
        <div id="begum-list"></div>
        <input type="text" id="b-in" placeholder="Yeni not...">
        <button onclick="addGen('begum','b-in')" style="width:100%; padding:15px; background:var(--sky); border:none; border-radius:12px; font-weight:bold;">Kaydet</button>
    </div>

    <div id="p-logs" class="panel">
        <h2 style="color:var(--gold)">📜 İşlem Geçmişi</h2>
        <div id="full-logs" class="log-container" style="height:500px;"></div>
        <button onclick="clearLogs()" style="width:100%; margin-top:10px; background:red; color:white; border:none; padding:10px; border-radius:10px;">Tarihi Sil</button>
    </div>

    <div id="p-god" class="panel">
        <h2 style="color:var(--gold)">⚡ Tanrı Modu</h2>
        <div class="card">
            <input type="text" id="s-name" placeholder="Sistem Adı">
            <input type="number" id="s-sal" placeholder="Maaş">
            <button onclick="setGod()" style="width:100%; padding:10px; background:var(--gold); border:none; border-radius:10px;">Güncelle</button>
        </div>
        <div class="card">
            <input type="text" id="ns-name" placeholder="Yeni Personel">
            <button onclick="addSt()" style="width:100%; padding:10px; background:var(--sky); border:none; border-radius:10px;">Ekle</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('p-dash', this)"><i>🏠</i>Dash</div>
        <div class="nav-item" onclick="nav('p-store', this)"><i>💼</i>Store</div>
        <div class="nav-item" onclick="nav('p-begum', this)"><i>💎</i>Begüm</div>
        <div class="nav-item" onclick="nav('p-logs', this)"><i>📜</i>Log</div>
        <div class="nav-item" onclick="nav('p-god', this)"><i>⚡</i>Tanrı</div>
    </nav>

    <script>
        const DB_KEY = 'NO48_FINAL_SYSTEM';
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
            name: "NO:48", salary: 52000, staff: [], begum: [], expenses: [], logs: []
        };

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); render(); }
        function nav(id, el) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            db.logs.unshift({time, msg});
            if(db.logs.length > 100) db.logs.pop();
            save();
        }

        function startMola(i, type, dur) {
            let s = db.staff[i];
            if(s.activeMola) return alert("Zaten molada!");
            s.activeMola = { type, start: Date.now(), dur: dur * 60 * 1000 };
            addLog(`${s.name} - ${type} Başladı`);
        }

        function stopMola(i) {
            let s = db.staff[i];
            if(!s.activeMola) return;
            addLog(`${s.name} - ${s.activeMola.type} BİTTİ`);
            s.activeMola = null;
        }

        function render() {
            // Dash Finans
            let totalExp = db.expenses.reduce((s, e) => s + e.amt, 0);
            document.getElementById('d-bal').innerText = (db.salary - totalExp).toLocaleString() + " ₺";

            // Staff & Timers
            const now = Date.now();
            let moladakiler = 0;
            document.getElementById('staff-container').innerHTML = db.staff.map((s, i) => {
                let timerHtml = '';
                if(s.activeMola) {
                    moladakiler++;
                    let diff = now - s.activeMola.start;
                    let display = "";
                    if(s.activeMola.dur > 0) { // Countdown
                        let rem = s.activeMola.dur - diff;
                        if(rem < 0) { display = "SÜRE DOLDU!"; }
                        else {
                            let m = Math.floor(rem / 60000);
                            let sec = Math.floor((rem % 60000) / 1000);
                            display = `Kalan: ${m}:${sec < 10 ? '0' : ''}${sec}`;
                        }
                    } else { // Stopwatch
                        let m = Math.floor(diff / 60000);
                        let sec = Math.floor((diff % 60000) / 1000);
                        display = `Geçen: ${m}:${sec < 10 ? '0' : ''}${sec}`;
                    }
                    timerHtml = `<div class="timer-display">${s.activeMola.type}: ${display}</div>`;
                }

                return `
                <div class="staff-card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${s.name}</b>
                        <span onclick="removeSt(${i})" style="color:red; font-size:10px;">KALDIR</span>
                    </div>
                    ${timerHtml}
                    <div class="btn-group">
                        <button class="m-btn b-yemek" onclick="startMola(${i},'Yemek',60)">YEMEK</button>
                        <button class="m-btn b-mola" onclick="startMola(${i},'1. MOLA',30)">1. MOLA</button>
                        <button class="m-btn b-mola" onclick="startMola(${i},'2. MOLA',30)">2. MOLA</button>
                        <button class="m-btn b-sigara" onclick="startMola(${i},'Sigara/Kahve',0)">SİGARA</button>
                        ${s.activeMola ? `<button class="m-btn b-stop" onclick="stopMola(${i})">MOLAYI BİTİR</button>` : ''}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('d-mola').innerText = moladakiler;

            // Logs
            let logHtml = db.logs.map(l => `<div class="log-entry"><span class="log-time">${l.time}</span> ${l.msg}</div>`).join('');
            document.getElementById('dash-logs').innerHTML = logHtml;
            document.getElementById('full-logs').innerHTML = logHtml;

            // Begüm
            document.getElementById('begum-list').innerHTML = db.begum.map((n, i) => `<div class="card" style="padding:10px; border-left:3px solid var(--sky)">${n} <span onclick="remove('begum',${i})" style="float:right">✓</span></div>`).join('');
        }

        // Helpers
        function setGod() { db.name = document.getElementById('s-name').value || db.name; db.salary = Number(document.getElementById('s-sal').value) || db.salary; save(); }
        function addSt() { let n = document.getElementById('ns-name').value; if(n){db.staff.push({name:n, activeMola:null}); save(); document.getElementById('ns-name').value='';} }
        function removeSt(i) { if(confirm("Personeli sil?")) { db.staff.splice(i, 1); save(); } }
        function remove(k, i) { db[k].splice(i, 1); save(); }
        function addGen(k, id) { let v = document.getElementById(id).value; if(v){db[k].push(v); save(); document.getElementById(id).value='';} }
        function clearLogs() { if(confirm("Tüm geçmiş silinecek?")) { db.logs = []; save(); } }

        setInterval(render, 1000); // Saniyelik sayaç güncelleme
        render();
    </script>
</body>
</html>
